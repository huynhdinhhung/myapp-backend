name: Backend CI - Build and Push GHCR

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/huynhdinhhung/myapp-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check backend health code exists
        run: grep -R "/health" src

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          docker build \
            -t $IMAGE_NAME:latest \
            -t $IMAGE_NAME:$SHORT_SHA \
            .

      - name: Push Docker image
        if: github.event_name == 'push'
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:$SHORT_SHA

      - name: Update GitOps backend image tag
        if: github.event_name == 'push'
        run: |
          SHORT_SHA=${GITHUB_SHA::7}

          git clone https://x-access-token:${{ secrets.GITOPS_TOKEN }}@github.com/huynhdinhhung/myapp-gitops.git

          cd myapp-gitops

          sed -i "s|image: ghcr.io/huynhdinhhung/myapp-backend:.*|image: ghcr.io/huynhdinhhung/myapp-backend:$SHORT_SHA|g" environments/dev/backend-deployment.yaml

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add environments/dev/backend-deployment.yaml
          git commit -m "update backend image to $SHORT_SHA" || echo "No changes to commit"
          git push origin main
